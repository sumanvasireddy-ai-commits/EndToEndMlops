name: Python CI/CD

# Trigger the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install the specific Python version
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies from your requirements.txt
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Check for syntax errors or style issues (Linting)
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 5. Run your unit tests
      - name: Run Tests with pytest
        run: |
          pytest
